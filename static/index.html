<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>NSYNC</title>
    <style>
        body {
            background-color: #EFEFEF;
            /* Classic light grey backdrop */
            font-family: Verdana, Arial, Helvetica, sans-serif;
            font-size: 12px;
            color: #000;
            margin: 0;
            padding: 15px 0;
        }

        a {
            color: #1F4F9F;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .page-container {
            max-width: 960px;
            margin: 0 auto;
            background-color: #FFFFFF;
            border: 1px solid #B0B0B0;
        }

        .site-header {
            background-color: #17385E;
            /* GameFAQs dark blue */
            padding: 15px 20px;
            color: #FFFFFF;
            display: flex;
            align-items: bottom;
        }

        .logo {
            font-family: Arial, sans-serif;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: -1px;
            text-shadow: 1px 1px 0px #000;
        }

        .header-subtext {
            font-size: 11px;
            margin-left: 10px;
            padding-bottom: 4px;
            align-self: flex-end;
            color: #A0B6D0;
        }

        .breadcrumbs {
            background-color: #E6EEF7;
            /* Light blue accent bar */
            border-bottom: 1px solid #C4D3E6;
            padding: 6px 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .main-content {
            display: flex;
            padding: 15px;
            gap: 20px;
        }

        .left-column {
            flex: 3;
            display: flex;
            gap: 20px;
        }

        .songs-section {
            flex: 1;
        }

        .search-section {
            flex: 1;
        }

        .right-column {
            flex: 1;
            min-width: 200px;
        }

        .box {
            border: 1px solid #A2B1C2;
            margin-bottom: 20px;
            background-color: #FFFFFF;
        }

        .box-header {
            background-color: #2F5687;
            /* Medium blue */
            color: #FFFFFF;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 10px;
            border-bottom: 1px solid #17385E;
        }

        .box-content {
            padding: 12px;
        }

        .gamefaqs-list {
            width: 100%;
            height: 300px;
            border: 1px solid #A2B1C2;
            font-family: Verdana, sans-serif;
            font-size: 12px;
            overflow-y: auto;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .gamefaqs-list li {
            padding: 6px 10px;
            border-bottom: 1px solid #F0F0F0;
            cursor: pointer;
        }

        .gamefaqs-list li:nth-child(even) {
            background-color: #F8F9FA;
        }

        .gamefaqs-list li.selected {
            background-color: #E6EEF7;
            font-weight: bold;
            color: #17385E;
        }

        /* Flex container for the box bodies to allow internal stretching */
        .box-auto-height {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .box-body-fill {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .search-input-group {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .gamefaqs-input {
            flex: 1;
            border: 1px solid #A2B1C2;
            padding: 4px;
            font-family: Verdana, sans-serif;
            font-size: 11px;
        }

        .search-result-item {
            font-size: 11px;
            line-height: 1.2;
        }

        .search-result-meta {
            color: #666;
            font-size: 10px;
            display: block;
        }

        .span-full {
            grid-column: 1 / -1;
            width: 100%;
        }

        .classic-btn {
            background-color: #F0F0F0;
            border: 1px solid #A2B1C2;
            padding: 5px 12px;
            font-family: Verdana, sans-serif;
            font-size: 11px;
            cursor: pointer;
            font-weight: bold;
            color: #333;
            margin-top: 10px;
        }

        .classic-btn:hover:not(:disabled) {
            background-color: #E6EEF7;
            border-color: #2F5687;
            color: #17385E;
        }

        .classic-btn:disabled {
            color: #999;
            cursor: default;
        }

        /* Follower List as classic sidebar nav */
        .sidebar-list {
            list-style-type: none;
            margin: 0;
            padding: 0;
        }

        .sidebar-list li {
            padding: 6px 10px;
            border-bottom: 1px solid #EAEAEA;
            font-size: 11px;
        }

        .sidebar-list li:nth-child(even) {
            background-color: #F8F9FA;
        }

        .sidebar-list a {
            display: block;
            width: 100%;
        }

        .footer {
            background-color: #17385E;
            color: #A0B6D0;
            text-align: center;
            padding: 15px;
            font-size: 10px;
            border-top: 4px solid #F39C12;
            /* Occasional GameFAQs orange accent */
        }

        /* Toast Notification style */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #17385E;
            color: #fff;
            text-align: center;
            border: 2px solid #F39C12;
            padding: 16px;
            position: fixed;
            z-index: 1000;
            right: 30px;
            bottom: 30px;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
        }

        #toast.show {
            visibility: visible;
            -webkit-animation: fadein 0.5s, fadeout 0.5s 2.5s;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @-webkit-keyframes fadein {
            from {
                bottom: 0;
                opacity: 0;
            }

            to {
                bottom: 30px;
                opacity: 1;
            }
        }

        @keyframes fadein {
            from {
                bottom: 0;
                opacity: 0;
            }

            to {
                bottom: 30px;
                opacity: 1;
            }
        }

        @-webkit-keyframes fadeout {
            from {
                bottom: 30px;
                opacity: 1;
            }

            to {
                bottom: 0;
                opacity: 0;
            }
        }

        @keyframes fadeout {
            from {
                bottom: 30px;
                opacity: 1;
            }

            to {
                bottom: 0;
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="page-container">

        <!-- Header -->
        <div class="site-header">
            <div class="logo">NSYNC</div>
        </div>

        <!-- Main Content -->
        <div class="main-content">

            <!-- Left Column: Songs & Search -->
            <div class="left-column" style="flex-direction: column;">
                <div style="display: flex; gap: 20px; width: 100%;">
                    <!-- Available Songs -->
                    <div class="songs-section" style="display: flex; flex-direction: column;">
                        <div class="box" style="flex: 1; display: flex; flex-direction: column; margin-bottom: 10px;">
                            <div class="box-header">Available Songs</div>
                            <div class="box-content" style="flex: 1; display: flex; flex-direction: column;">
                                <ul id="songs-list" class="gamefaqs-list" style="height: 334px;"></ul>
                            </div>
                        </div>
                    </div>

                    <!-- Search Section -->
                    <div class="search-section" style="display: flex; flex-direction: column;">
                        <div class="box" style="flex: 1; display: flex; flex-direction: column; margin-bottom: 10px;">
                            <div class="box-header">Search</div>
                            <div class="box-content" style="flex: 1; display: flex; flex-direction: column;">
                                <div class="search-input-group">
                                    <input type="text" id="search-input" class="gamefaqs-input"
                                        placeholder="Artist, album, title...">
                                    <button id="search-btn" class="classic-btn" style="margin-top:0">Search</button>
                                </div>
                                <ul id="search-results-list" class="gamefaqs-list" style="height: 300px;"></ul>
                            </div>
                        </div>
                    </div>
                </div>

                <div style="width: 100%;">
                    <button id="push-btn" class="classic-btn" style="width:100%; margin-top:0" disabled>Add Selected
                        Track To Queue</button>
                </div>
            </div>

            <!-- Right Column: Sidebar Followers -->
            <div class="right-column">

                <div class="box">
                    <div class="box-header">Connected Followers</div>
                    <div class="box-content" style="padding: 12px 12px 0 12px;">
                        <div class="search-input-group">
                            <input type="text" id="follower-url-input" class="gamefaqs-input" placeholder="ip:port/endpoint">
                            <button id="subscribe-btn" class="classic-btn" style="margin-top:0" disabled>Subscribe</button>
                        </div>
                    </div>
                    <!-- padding:0 to make list items flush like a standard forum sidebar -->
                    <div class="box-content" style="padding: 0; max-height: 200px; overflow-y: auto;">
                        <ul id="followers-list" class="sidebar-list"></ul>
                    </div>
                </div>

                <div class="box">
                    <div class="box-header">Now Playing</div>
                    <div class="box-content"
                        style="text-align: center; font-weight: bold; padding: 20px 10px; color: #17385E; background-color: #E6EEF7; font-size: 13px;">
                        <span id="now-playing-label">Idle (Waiting for Track)</span>
                    </div>
                </div>

                <div class="box">
                    <div class="box-header">Current Queue</div>
                    <div class="box-content" style="padding: 0; max-height: 200px; overflow-y: auto;">
                        <ul id="queue-list" class="sidebar-list"></ul>
                    </div>
                </div>
            </div>

        </div>

        <div class="footer">
            Background music everywhere, like in a video game!
        </div>
    </div>

    <!-- Retro Toast Notification -->
    <div id="toast">Track pushed successfully!</div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const songsList = document.getElementById('songs-list');
            const followersList = document.getElementById('followers-list');
            const queueList = document.getElementById('queue-list');
            const pushBtn = document.getElementById('push-btn');
            const notification = document.getElementById('notification');
            const notifMsg = document.getElementById('notif-msg');
            const notifTitle = document.getElementById('notif-title');

            const searchBtn = document.getElementById('search-btn');
            const searchInput = document.getElementById('search-input');
            const searchResultsList = document.getElementById('search-results-list');

            let currentSelectedTrack = null;

            function selectTrack(element, trackId, sourceList) {
                // Deselect all in both lists
                Array.from(songsList.children).forEach(child => child.classList.remove('selected'));
                Array.from(searchResultsList.children).forEach(child => child.classList.remove('selected'));

                element.classList.add('selected');
                currentSelectedTrack = trackId;
                pushBtn.disabled = false;
            }

            // Load local songs
            fetch('/songs')
                .then(res => res.json())
                .then(data => {
                    if (data && data.songs) {
                        data.songs.forEach(song => {
                            const li = document.createElement('li');
                            li.innerHTML = `
                                <div class="search-result-item">
                                    <strong>${song.title}</strong>
                                    <span class="search-result-meta">${song.artist} - ${song.album}</span>
                                </div>
                            `;
                            li.addEventListener('click', () => selectTrack(li, song.id));
                            songsList.appendChild(li);
                        });
                    }
                })

            // Search Logic
            function performSearch() {
                const query = searchInput.value.trim();
                if (!query) return;

                searchBtn.disabled = true;
                searchResultsList.innerHTML = '<li>Searching...</li>';

                fetch(`/songs?query=${encodeURIComponent(query)}`)
                    .then(res => res.json())
                    .then(data => {
                        searchResultsList.innerHTML = '';
                        searchBtn.disabled = false;
                        if (data && data.songs && data.songs.length > 0) {
                            data.songs.forEach(song => {
                                const li = document.createElement('li');
                                li.innerHTML = `
                                    <div class="search-result-item">
                                        <strong>${song.title}</strong>
                                        <span class="search-result-meta">${song.artist} - ${song.album}</span>
                                    </div>
                                `;
                                li.addEventListener('click', () => selectTrack(li, song.id));
                                searchResultsList.appendChild(li);
                            });
                        } else {
                            searchResultsList.innerHTML = '<li>No results found.</li>';
                        }
                    })
                    .catch(err => {
                        console.error("Search failed:", err);
                        searchResultsList.innerHTML = '<li>Search failed.</li>';
                        searchBtn.disabled = false;
                    });
            }

            searchBtn.addEventListener('click', performSearch);
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') performSearch();
            });

            // Load followers
            fetch('/followers')
                .then(res => res.json())
                .then(data => {
                    if (data && data.followerUrls) {
                        data.followerUrls.forEach(follower => {
                            const li = document.createElement('li');
                            // Add hyperlink to mimic gamefaqs links
                            const p = document.createElement('p');
                            p.textContent = follower;
                            li.appendChild(p);
                            followersList.appendChild(li);
                        });
                    } else if (data && data.followerUrls && data.followerUrls.length === 0) {
                        const li = document.createElement('li');
                        li.textContent = "No followers currently connected.";
                        followersList.appendChild(li);
                    }
                })
                .catch(err => {
                    console.error("Failed to load followers:", err);
                    const li = document.createElement('li');
                    li.textContent = "Error loading followers.";
                    followersList.appendChild(li);
                });

            // Subscribe Follower Logic
            const subscribeBtn = document.getElementById('subscribe-btn');
            const followerUrlInput = document.getElementById('follower-url-input');

            followerUrlInput.addEventListener('input', () => {
                subscribeBtn.disabled = !followerUrlInput.value.trim();
            });

            function subscribeFollower() {
                const url = followerUrlInput.value.trim();
                if (!url) return;

                subscribeBtn.disabled = true;
                fetch('/followers', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                })
                    .then(response => {
                        if (response.ok) {
                            showToast('Follower subscribed successfully!');
                            followerUrlInput.value = '';
                            subscribeBtn.disabled = true;
                            // Reload followers list
                            followersList.innerHTML = '';
                            return fetch('/followers').then(r => r.json());
                        } else {
                            return response.text().then(t => { throw new Error(t); });
                        }
                    })
                    .then(data => {
                        if (data && data.followerUrls) {
                            data.followerUrls.forEach(f => {
                                const li = document.createElement('li');
                                const p = document.createElement('p');
                                p.textContent = f;
                                li.appendChild(p);
                                followersList.appendChild(li);
                            });
                        }
                    })
                    .catch(err => {
                        showToast('Failed to subscribe: ' + err.message);
                        subscribeBtn.disabled = !followerUrlInput.value.trim();
                    });
            }

            subscribeBtn.addEventListener('click', subscribeFollower);
            followerUrlInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && followerUrlInput.value.trim()) subscribeFollower();
            });

            // Initial queue load removed in favor of SSE StreamQueue

            // Toast helper
            function showToast(message) {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.className = "show";
                setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
            }

            // Push Track Action
            pushBtn.addEventListener('click', () => {
                if (!currentSelectedTrack) return;

                fetch('/tracks', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ trackId: currentSelectedTrack })
                })
                    .then(response => {
                        if (response.ok) {
                            showToast('Track successfully pushed to queue!');
                        } else {
                            showToast('Failed to push track (Error ' + response.status + ').');
                        }
                    })
                    .catch(err => {
                        showToast('Network error: Could not connect to Grandmaster.');
                    });
            });

            // SSE Listener for Combined Queue and Now Playing
            const nowPlayingLabel = document.getElementById('now-playing-label');
            const evtSource = new EventSource('/queue');

            evtSource.onmessage = function (event) {
                const data = JSON.parse(event.data);

                // Update Now Playing
                nowPlayingLabel.textContent = data.nowPlaying || 'Idle';

                // Update Queue List
                queueList.innerHTML = '';
                if (data && data.queueItems && data.queueItems.length > 0) {
                    data.tracks = data.queueItems; // Compatibility if needed
                    data.queueItems.forEach(track => {
                        const li = document.createElement('li');
                        const p = document.createElement('p');
                        p.style.margin = "0";
                        p.textContent = track;
                        li.appendChild(p);
                        queueList.appendChild(li);
                    });
                } else {
                    const li = document.createElement('li');
                    li.textContent = "Queue is currently empty.";
                    queueList.appendChild(li);
                }
            };

            evtSource.onerror = function (err) {
                console.error("EventSource connection lost", err);
                nowPlayingLabel.textContent = 'Disconnected...';
                queueList.innerHTML = '<li>Connection lost...</li>';
            };

        });
    </script>

</body>

</html>
