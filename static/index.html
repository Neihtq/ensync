<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>NSync Grandmaster</title>
    <style>
        body {
            background-color: #EFEFEF;
            /* Classic light grey backdrop */
            font-family: Verdana, Arial, Helvetica, sans-serif;
            font-size: 12px;
            color: #000;
            margin: 0;
            padding: 15px 0;
        }

        a {
            color: #1F4F9F;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .page-container {
            max-width: 960px;
            margin: 0 auto;
            background-color: #FFFFFF;
            border: 1px solid #B0B0B0;
        }

        .site-header {
            background-color: #17385E;
            /* GameFAQs dark blue */
            padding: 15px 20px;
            color: #FFFFFF;
            display: flex;
            align-items: bottom;
        }

        .logo {
            font-family: Arial, sans-serif;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: -1px;
            text-shadow: 1px 1px 0px #000;
        }

        .header-subtext {
            font-size: 11px;
            margin-left: 10px;
            padding-bottom: 4px;
            align-self: flex-end;
            color: #A0B6D0;
        }

        .breadcrumbs {
            background-color: #E6EEF7;
            /* Light blue accent bar */
            border-bottom: 1px solid #C4D3E6;
            padding: 6px 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .main-content {
            display: flex;
            padding: 15px;
            gap: 20px;
        }

        .left-column {
            flex: 3;
        }

        .right-column {
            flex: 1;
            min-width: 200px;
        }

        .box {
            border: 1px solid #A2B1C2;
            margin-bottom: 20px;
            background-color: #FFFFFF;
        }

        .box-header {
            background-color: #2F5687;
            /* Medium blue */
            color: #FFFFFF;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 10px;
            border-bottom: 1px solid #17385E;
        }

        .box-content {
            padding: 12px;
        }

        .gamefaqs-select {
            width: 100%;
            height: 300px;
            border: 1px solid #A2B1C2;
            font-family: Verdana, sans-serif;
            font-size: 12px;
            padding: 4px;
            outline: none;
        }

        .gamefaqs-select option {
            padding: 3px 5px;
            border-bottom: 1px solid #F0F0F0;
        }

        .gamefaqs-select option:nth-child(even) {
            background-color: #F8F9FA;
        }

        .classic-btn {
            background-color: #F0F0F0;
            border: 1px solid #A2B1C2;
            padding: 5px 12px;
            font-family: Verdana, sans-serif;
            font-size: 11px;
            cursor: pointer;
            font-weight: bold;
            color: #333;
            margin-top: 10px;
        }

        .classic-btn:hover:not(:disabled) {
            background-color: #E6EEF7;
            border-color: #2F5687;
            color: #17385E;
        }

        .classic-btn:disabled {
            color: #999;
            cursor: default;
        }

        /* Follower List as classic sidebar nav */
        .sidebar-list {
            list-style-type: none;
            margin: 0;
            padding: 0;
        }

        .sidebar-list li {
            padding: 6px 10px;
            border-bottom: 1px solid #EAEAEA;
            font-size: 11px;
        }

        .sidebar-list li:nth-child(even) {
            background-color: #F8F9FA;
        }

        .sidebar-list a {
            display: block;
            width: 100%;
        }

        .footer {
            background-color: #17385E;
            color: #A0B6D0;
            text-align: center;
            padding: 15px;
            font-size: 10px;
            border-top: 4px solid #F39C12;
            /* Occasional GameFAQs orange accent */
        }

        /* Notification Alert GameFAQs style */
        #notification {
            display: none;
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            background-color: #FFFFFF;
            border: 2px solid #17385E;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 1000;
        }

        #notification .box-header {
            background-color: #17385E;
            /* Dark blue header for the alert */
            display: flex;
            justify-content: space-between;
        }

        #notification .box-content {
            text-align: center;
            padding: 25px 15px;
        }

        .close-btn {
            color: #A0B6D0;
            cursor: pointer;
            font-weight: normal;
        }

        .close-btn:hover {
            color: #FFFFFF;
        }
    </style>
</head>

<body>

    <div class="page-container">

        <!-- Header -->
        <div class="site-header">
            <div class="logo">NSync</div>
        </div>

        <!-- Main Content -->
        <div class="main-content">

            <!-- Left Column: Songs -->
            <div class="left-column">
                <div class="box">
                    <div class="box-header">Available Songs</div>
                    <div class="box-content">
                        <select id="songs-list" size="15" class="gamefaqs-select"></select>
                        <div>
                            <button id="push-btn" class="classic-btn" disabled>Add Selected Track To Queue</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Sidebar Followers -->
            <div class="right-column">
                <div class="box">
                    <div class="box-header">Connected Followers</div>
                    <!-- padding:0 to make list items flush like a standard forum sidebar -->
                    <div class="box-content" style="padding: 0;">
                        <ul id="followers-list" class="sidebar-list"></ul>
                    </div>
                </div>
            </div>

        </div>

        <div class="footer">
            Background music everywhere, like in a video game!
        </div>
    </div>

    <!-- Retro Alert Popup -->
    <div id="notification">
        <div class="box-header">
            <span id="notif-title">System Message</span>
            <span class="close-btn" onclick="document.getElementById('notification').style.display='none'">[X]</span>
        </div>
        <div class="box-content">
            <p id="notif-msg" style="margin-top: 0; font-weight: bold; font-size: 12px; color: #333;">Track pushed
                successfully!</p>
            <button class="classic-btn" onclick="document.getElementById('notification').style.display='none'"
                style="margin-top: 15px; min-width: 80px;">OK</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const songsList = document.getElementById('songs-list');
            const followersList = document.getElementById('followers-list');
            const pushBtn = document.getElementById('push-btn');
            const notification = document.getElementById('notification');
            const notifMsg = document.getElementById('notif-msg');
            const notifTitle = document.getElementById('notif-title');

            // Load songs
            fetch('/songs')
                .then(res => res.json())
                .then(data => {
                    if (data && data.songs) {
                        data.songs.forEach(song => {
                            const option = document.createElement('option');
                            option.value = song;
                            option.textContent = song;
                            songsList.appendChild(option);
                        });
                    }
                })
                .catch(err => {
                    console.error("Failed to load songs:", err);
                });

            // Load followers
            fetch('/followers')
                .then(res => res.json())
                .then(data => {
                    if (data && data.followerUrls) {
                        data.followerUrls.forEach(follower => {
                            const li = document.createElement('li');
                            // Add hyperlink to mimic gamefaqs links
                            const p = document.createElement('p');
                            p.textContent = follower;
                            li.appendChild(p);
                            followersList.appendChild(li);
                        });
                    } else if (data && data.followerUrls && data.followerUrls.length === 0) {
                        const li = document.createElement('li');
                        li.textContent = "No followers currently connected.";
                        followersList.appendChild(li);
                    }
                })
                .catch(err => {
                    console.error("Failed to load followers:", err);
                    const li = document.createElement('li');
                    li.textContent = "Error loading followers.";
                    followersList.appendChild(li);
                });

            // Enable button when song selected
            songsList.addEventListener('change', () => {
                if (songsList.selectedIndex !== -1) {
                    pushBtn.disabled = false;
                }
            });

            // Push Track Action
            pushBtn.addEventListener('click', () => {
                const selectedSong = songsList.value;
                if (!selectedSong) return;

                fetch('/tracks', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ trackId: selectedSong })
                })
                    .then(response => {
                        if (response.ok) {
                            notifMsg.textContent = 'Track successfully pushed to queue!';
                            notifTitle.textContent = 'Action Successful';
                        } else {
                            notifMsg.textContent = 'Failed to push track (Error ' + response.status + ').';
                            notifTitle.textContent = 'Action Failed';
                        }
                        notification.style.display = 'block';
                    })
                    .catch(err => {
                        notifMsg.textContent = 'Network error: Could not connect to Grandmaster.';
                        notifTitle.textContent = 'System Error';
                        notification.style.display = 'block';
                    });
            });
        });
    </script>

</body>

</html>
